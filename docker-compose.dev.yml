# Full-stack dev environment with hot reload
#
# Backend: air watches Go source → auto-rebuilds on change
# Frontend: Rsbuild dev server with HMR, proxies /api /mj /pg → backend
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   Open http://localhost:3001
#
# First run takes a few minutes to pull images and install deps.
# Stop:
#   docker compose -f docker-compose.dev.yml down
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app                    # mount full source so air can watch Go files
      - go_mod_cache:/go/pkg/mod  # keep module cache across rebuilds
      - dev_data:/data
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - dev-network

  frontend:
    image: oven/bun:1
    container_name: new-api-dev-frontend
    working_dir: /app/web/default
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app/web             # mount web source for HMR
      - bun_cache:/root/.bun       # cache bun install across restarts
    environment:
      # proxy target: points to the backend container
      - VITE_REACT_APP_SERVER_URL=http://new-api:3000
    command: >
      sh -c "cd /app/web && bun install --frozen-lockfile &&
             cd /app/web/default && bun run dev --port 3001"
    depends_on:
      - new-api
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_data:
  dev_pg_data:
  go_mod_cache:
  bun_cache:

networks:
  dev-network:
    driver: bridge
